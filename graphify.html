<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphify — DesignSystem/src + package</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--text:#e8e8f0;--muted:#7a7a90;--accent:#7C3AED}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-header p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px 20px;border-bottom:1px solid var(--border)}
.stat{background:var(--surface2);padding:8px 10px;border-radius:8px}
.stat-val{font-size:18px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.legend{padding:16px 20px;border-bottom:1px solid var(--border)}
.legend h3{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.legend-items{display:flex;flex-wrap:wrap;gap:6px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:6px;border:1px solid transparent;transition:.2s}
.legend-item:hover,.legend-item.active{border-color:var(--border);background:var(--surface2);color:var(--text)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.search-wrap{padding:12px 20px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.file-list{flex:1;overflow-y:auto;padding:8px}
.file-list::-webkit-scrollbar{width:4px}
.file-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--muted);transition:.15s}
.file-item:hover{background:var(--surface2);color:var(--text)}
.file-item.selected{background:rgba(124,58,237,.15);color:#c4b5fd;border:1px solid rgba(124,58,237,.3)}
.file-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-lines{font-size:9px;color:var(--muted)}
/* Canvas */
.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
/* Tooltip */
.tooltip{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:12px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .15s;z-index:20;backdrop-filter:blur(12px)}
.tooltip.show{opacity:1}
.tooltip h4{font-size:13px;font-weight:700;margin-bottom:4px}
.tooltip .tp{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px}
.tooltip .deps{font-size:10px;color:var(--muted);line-height:1.6}
.tooltip .dep-tag{display:inline-block;background:var(--surface2);padding:1px 6px;border-radius:4px;margin:1px 2px;font-size:9px;color:var(--text)}
/* Controls */
.controls{position:absolute;bottom:16px;right:16px;display:flex;gap:6px}
.ctrl-btn{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.ctrl-btn:hover{background:var(--surface2);border-color:var(--accent)}
.view-toggle{position:absolute;top:16px;right:16px;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-btn{padding:6px 14px;font-size:11px;font-family:inherit;color:var(--muted);background:none;border:none;cursor:pointer;transition:.2s}
.view-btn.active{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div id="app">
<div class="sidebar">
  <div class="sidebar-header">
    <h1>⬡ GRAPHIFY</h1>
    <p>DesignSystem / src + package</p>
  </div>
  <div class="stats-row" id="stats"></div>
  <div class="legend">
    <h3>Modules</h3>
    <div class="legend-items" id="legend"></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search files…" autocomplete="off"/>
  </div>
  <div class="file-list" id="fileList"></div>
</div>
<div class="canvas-wrap">
  <canvas id="graph"></canvas>
  <div class="tooltip" id="tooltip"></div>
  <div class="controls">
    <button class="ctrl-btn" id="zoomIn" title="Zoom In">+</button>
    <button class="ctrl-btn" id="zoomOut" title="Zoom Out">−</button>
    <button class="ctrl-btn" id="resetView" title="Reset">⟳</button>
  </div>
</div>
</div>
<script src="graphify-data.js"></script>
<script>
(() => {
const { nodes, edges, groups, stats } = GRAPH_DATA;
// --- Stats ---
document.getElementById('stats').innerHTML =
  Object.entries(stats).map(([k,v])=>`<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())}</div></div>`).join('');
// --- Legend ---
const legendEl = document.getElementById('legend');
let activeGroup = null;
Object.entries(groups).forEach(([key, g]) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-dot" style="background:${g.color}"></span>${g.label}`;
  el.onclick = () => {
    activeGroup = activeGroup === key ? null : key;
    document.querySelectorAll('.legend-item').forEach(e => e.classList.remove('active'));
    if (activeGroup) el.classList.add('active');
    renderFileList(); draw();
  };
  legendEl.appendChild(el);
});
// --- File List ---
const fileListEl = document.getElementById('fileList');
const searchEl = document.getElementById('search');
let selectedNode = null;
function renderFileList() {
  const q = searchEl.value.toLowerCase();
  const filtered = nodes.filter(n => {
    if (activeGroup && n.group !== activeGroup) return false;
    if (q && !n.label.toLowerCase().includes(q) && !n.path.toLowerCase().includes(q)) return false;
    return true;
  });
  fileListEl.innerHTML = filtered.map(n => `
    <div class="file-item ${selectedNode===n.id?'selected':''}" data-id="${n.id}">
      <span class="file-dot" style="background:${groups[n.group].color}"></span>
      <span class="file-name">${n.label}</span>
      <span class="file-lines">${n.lines}L</span>
    </div>`).join('');
  fileListEl.querySelectorAll('.file-item').forEach(el => {
    el.onclick = () => { selectNode(el.dataset.id); };
  });
}
searchEl.oninput = renderFileList;
function selectNode(id) {
  selectedNode = selectedNode === id ? null : id;
  renderFileList(); draw();
  if (selectedNode) {
    const n = simNodes.find(s => s.id === selectedNode);
    if (n) { panX = canvas.width/2 - n.x * zoom; panY = canvas.height/2 - n.y * zoom; draw(); }
  }
}
// --- Canvas Setup ---
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const r = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * r; canvas.height = H * r;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(r, 0, 0, r, 0, 0);
  draw();
}
window.addEventListener('resize', resize);
// --- Force Simulation ---
const simNodes = nodes.map((n, i) => {
  const groupKeys = Object.keys(groups);
  const gi = groupKeys.indexOf(n.group);
  const angle = (gi / groupKeys.length) * Math.PI * 2;
  const radius = 250;
  return { ...n, x: Math.cos(angle) * radius + (Math.random()-0.5)*120, y: Math.sin(angle) * radius + (Math.random()-0.5)*120, vx: 0, vy: 0 };
});
const simEdges = edges.map(e => ({ ...e, source: simNodes.find(n=>n.id===e.from), target: simNodes.find(n=>n.id===e.to) }));
function simulate(iterations) {
  for (let iter = 0; iter < iterations; iter++) {
    const alpha = 1 - iter / iterations;
    // Repulsion
    for (let i = 0; i < simNodes.length; i++) {
      for (let j = i+1; j < simNodes.length; j++) {
        let dx = simNodes[j].x - simNodes[i].x;
        let dy = simNodes[j].y - simNodes[i].y;
        let d2 = dx*dx + dy*dy;
        if (d2 < 1) d2 = 1;
        const f = 8000 / d2;
        const fx = dx / Math.sqrt(d2) * f * alpha;
        const fy = dy / Math.sqrt(d2) * f * alpha;
        simNodes[i].vx -= fx; simNodes[i].vy -= fy;
        simNodes[j].vx += fx; simNodes[j].vy += fy;
      }
    }
    // Attraction (edges)
    for (const e of simEdges) {
      if (!e.source || !e.target) continue;
      let dx = e.target.x - e.source.x;
      let dy = e.target.y - e.source.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      if (d < 1) d = 1;
      const ideal = e.source.group === e.target.group ? 80 : 160;
      const f = (d - ideal) * 0.02 * alpha;
      const fx = dx/d * f; const fy = dy/d * f;
      e.source.vx += fx; e.source.vy += fy;
      e.target.vx -= fx; e.target.vy -= fy;
    }
    // Group gravity
    const groupCenters = {};
    for (const n of simNodes) {
      if (!groupCenters[n.group]) groupCenters[n.group] = {x:0,y:0,c:0};
      groupCenters[n.group].x += n.x;
      groupCenters[n.group].y += n.y;
      groupCenters[n.group].c++;
    }
    for (const k in groupCenters) { groupCenters[k].x /= groupCenters[k].c; groupCenters[k].y /= groupCenters[k].c; }
    for (const n of simNodes) {
      const gc = groupCenters[n.group];
      n.vx += (gc.x - n.x) * 0.008 * alpha;
      n.vy += (gc.y - n.y) * 0.008 * alpha;
    }
    // Center gravity
    for (const n of simNodes) {
      n.vx -= n.x * 0.001 * alpha;
      n.vy -= n.y * 0.001 * alpha;
    }
    // Apply velocity
    for (const n of simNodes) {
      n.vx *= 0.6; n.vy *= 0.6;
      n.x += n.vx; n.y += n.vy;
    }
  }
}
simulate(300);
// --- Zoom & Pan ---
let zoom = 1, panX = 0, panY = 0;
function resetView() {
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const n of simNodes){minX=Math.min(minX,n.x);maxX=Math.max(maxX,n.x);minY=Math.min(minY,n.y);maxY=Math.max(maxY,n.y);}
  const pad=80;
  const scaleX=(W-pad*2)/(maxX-minX||1);
  const scaleY=(H-pad*2)/(maxY-minY||1);
  zoom=Math.min(scaleX,scaleY,2);
  panX=W/2-(minX+maxX)/2*zoom;
  panY=H/2-(minY+maxY)/2*zoom;
  draw();
}
document.getElementById('zoomIn').onclick=()=>{zoom*=1.2;draw()};
document.getElementById('zoomOut').onclick=()=>{zoom/=1.2;draw()};
document.getElementById('resetView').onclick=resetView;
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=e.deltaY>0?0.9:1.1;
  const mx=e.offsetX,my=e.offsetY;
  panX=mx-(mx-panX)*r;panY=my-(my-panY)*r;
  zoom*=r;draw();
},{passive:false});
// --- Drag ---
let dragging=null,dragOffX=0,dragOffY=0,isPanning=false,panStartX=0,panStartY=0;
function screenToWorld(sx,sy){return{x:(sx-panX)/zoom,y:(sy-panY)/zoom}}
function hitTest(sx,sy){
  const w=screenToWorld(sx,sy);
  for(let i=simNodes.length-1;i>=0;i--){
    const n=simNodes[i];
    const r=getNodeRadius(n);
    if((w.x-n.x)**2+(w.y-n.y)**2<(r+4)**2)return n;
  }
  return null;
}
canvas.addEventListener('mousedown',e=>{
  const n=hitTest(e.offsetX,e.offsetY);
  if(n){dragging=n;const w=screenToWorld(e.offsetX,e.offsetY);dragOffX=n.x-w.x;dragOffY=n.y-w.y;}
  else{isPanning=true;panStartX=e.offsetX-panX;panStartY=e.offsetY-panY;}
});
canvas.addEventListener('mousemove',e=>{
  if(dragging){const w=screenToWorld(e.offsetX,e.offsetY);dragging.x=w.x+dragOffX;dragging.y=w.y+dragOffY;draw();}
  else if(isPanning){panX=e.offsetX-panStartX;panY=e.offsetY-panStartY;draw();}
  else{
    const n=hitTest(e.offsetX,e.offsetY);
    canvas.style.cursor=n?'grab':'default';
    showTooltip(n,e.offsetX,e.offsetY);
    hoveredNode=n?n.id:null; draw();
  }
});
canvas.addEventListener('mouseup',()=>{
  if(dragging)dragging=null;
  isPanning=false;
});
canvas.addEventListener('dblclick',e=>{
  const n=hitTest(e.offsetX,e.offsetY);
  if(n)selectNode(n.id);
});
// --- Tooltip ---
let hoveredNode=null;
const tooltipEl=document.getElementById('tooltip');
function showTooltip(n,mx,my){
  if(!n){tooltipEl.classList.remove('show');return;}
  const incoming=edges.filter(e=>e.to===n.id).map(e=>nodes.find(nd=>nd.id===e.from)?.label).filter(Boolean);
  const outgoing=edges.filter(e=>e.from===n.id).map(e=>nodes.find(nd=>nd.id===e.to)?.label).filter(Boolean);
  tooltipEl.innerHTML=`
    <h4>${n.label}</h4>
    <div class="tp">${n.path} · ${n.lines} lines · ${n.type}</div>
    <div class="deps">
      ${incoming.length?`<div>← <b>${incoming.length}</b> imports this: ${incoming.map(l=>`<span class="dep-tag">${l}</span>`).join('')}</div>`:''}
      ${outgoing.length?`<div style="margin-top:4px">→ imports <b>${outgoing.length}</b>: ${outgoing.map(l=>`<span class="dep-tag">${l}</span>`).join('')}</div>`:''}
    </div>`;
  tooltipEl.classList.add('show');
  let tx=mx+16,ty=my-10;
  if(tx+280>W)tx=mx-290;
  if(ty+tooltipEl.offsetHeight>H)ty=H-tooltipEl.offsetHeight-10;
  if(ty<10)ty=10;
  tooltipEl.style.left=tx+'px';tooltipEl.style.top=ty+'px';
}
// --- Drawing ---
function getNodeRadius(n){return Math.max(6, Math.min(20, Math.sqrt(n.lines)*1.4));}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
  const isFiltered=activeGroup||selectedNode;
  const connectedIds=new Set();
  if(selectedNode){
    connectedIds.add(selectedNode);
    edges.forEach(e=>{if(e.from===selectedNode)connectedIds.add(e.to);if(e.to===selectedNode)connectedIds.add(e.from);});
  }
  // Group hulls
  const groupNodes={};
  simNodes.forEach(n=>{if(!groupNodes[n.group])groupNodes[n.group]=[];groupNodes[n.group].push(n);});
  for(const[gk,gns]of Object.entries(groupNodes)){
    if(gns.length<2)continue;
    if(activeGroup&&gk!==activeGroup)continue;
    const g=groups[gk];
    let cx=0,cy=0;gns.forEach(n=>{cx+=n.x;cy+=n.y;});cx/=gns.length;cy/=gns.length;
    let maxR=0;gns.forEach(n=>{const d=Math.sqrt((n.x-cx)**2+(n.y-cy)**2);if(d>maxR)maxR=d;});
    ctx.beginPath();ctx.arc(cx,cy,maxR+40,0,Math.PI*2);
    ctx.fillStyle=g.color+'08';ctx.fill();
    ctx.strokeStyle=g.color+'18';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=g.color+'60';ctx.font='600 9px Inter';ctx.textAlign='center';
    ctx.fillText(g.label.toUpperCase(),cx,cy-maxR-20);
  }
  // Edges
  for(const e of simEdges){
    if(!e.source||!e.target)continue;
    let alpha=0.12;
    if(selectedNode){
      if(e.from===selectedNode||e.to===selectedNode)alpha=0.7;
      else alpha=0.03;
    }else if(hoveredNode){
      if(e.from===hoveredNode||e.to===hoveredNode)alpha=0.6;
      else alpha=0.05;
    }
    if(activeGroup&&e.source.group!==activeGroup&&e.target.group!==activeGroup)alpha*=0.2;
    ctx.beginPath();
    ctx.moveTo(e.source.x,e.source.y);
    // Curved edges
    const mx2=(e.source.x+e.target.x)/2;const my2=(e.source.y+e.target.y)/2;
    const dx=e.target.x-e.source.x;const dy=e.target.y-e.source.y;
    const cx2=mx2-dy*0.1;const cy2=my2+dx*0.1;
    ctx.quadraticCurveTo(cx2,cy2,e.target.x,e.target.y);
    let eColor=groups[e.source.group]?.color||'#555';
    if(selectedNode&&(e.from===selectedNode||e.to===selectedNode)){
      eColor=e.from===selectedNode?'#7C3AED':'#EC4899';
    }
    if(e.cross){ctx.setLineDash([6,4]);ctx.lineWidth=2.2;eColor='#F59E0B';alpha=Math.max(alpha,0.5);}
    else{ctx.setLineDash([]);ctx.lineWidth=1.2;}
    ctx.strokeStyle=eColor;ctx.globalAlpha=alpha;ctx.stroke();ctx.setLineDash([]);
    // Arrow
    const t=0.85;
    const ax=e.source.x*(1-t)*(1-t)+cx2*2*(1-t)*t+e.target.x*t*t;
    const ay=e.source.y*(1-t)*(1-t)+cy2*2*(1-t)*t+e.target.y*t*t;
    const t2=0.83;
    const bx=e.source.x*(1-t2)*(1-t2)+cx2*2*(1-t2)*t2+e.target.x*t2*t2;
    const by=e.source.y*(1-t2)*(1-t2)+cy2*2*(1-t2)*t2+e.target.y*t2*t2;
    const ang=Math.atan2(ay-by,ax-bx);
    const as=5;
    ctx.beginPath();ctx.moveTo(ax,ay);
    ctx.lineTo(ax-as*Math.cos(ang-0.4),ay-as*Math.sin(ang-0.4));
    ctx.lineTo(ax-as*Math.cos(ang+0.4),ay-as*Math.sin(ang+0.4));
    ctx.closePath();ctx.fillStyle=eColor;ctx.fill();
    ctx.globalAlpha=1;
  }
  // Nodes
  for(const n of simNodes){
    let nodeAlpha=1;
    if(selectedNode&&!connectedIds.has(n.id))nodeAlpha=0.12;
    if(activeGroup&&n.group!==activeGroup)nodeAlpha=0.1;
    const r=getNodeRadius(n);
    const color=groups[n.group].color;
    ctx.globalAlpha=nodeAlpha;
    // Glow
    if(n.id===hoveredNode||n.id===selectedNode){
      const grd=ctx.createRadialGradient(n.x,n.y,r,n.x,n.y,r*3);
      grd.addColorStop(0,color+'40');grd.addColorStop(1,color+'00');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,r*3,0,Math.PI*2);ctx.fill();
    }
    // Circle
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    const grad=ctx.createRadialGradient(n.x-r*0.3,n.y-r*0.3,0,n.x,n.y,r);
    grad.addColorStop(0,color);grad.addColorStop(1,color+'CC');
    ctx.fillStyle=grad;ctx.fill();
    if(n.id===selectedNode){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
    else if(n.id===hoveredNode){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();}
    // Icon
    ctx.fillStyle='#fff';ctx.font=`${Math.max(7,r*0.7)}px Inter`;ctx.textAlign='center';ctx.textBaseline='middle';
    const icon=n.type==='screen'?'◉':n.type==='hook'?'⟡':n.type==='types'?'◇':n.type==='config'?'⚙':n.type==='barrel'?'⊡':'●';
    ctx.fillText(icon,n.x,n.y);
    // Label
    if(zoom>0.5||n.id===hoveredNode||n.id===selectedNode){
      ctx.font='600 9px Inter';ctx.fillStyle=n.id===hoveredNode||n.id===selectedNode?'#fff':color+'DD';
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(n.label,n.x,n.y+r+4);
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
// Init
renderFileList();
setTimeout(()=>{resize();resetView();},50);
})();
</script>
</body>
</html>
